<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Header -->
  <header class="bg-dark text-white text-center p-3">
    <h2>Settings</h2>
  </header>

  <!-- Main Layout -->
  <div class="container-fluid">
    <div class="row">
      <!-- Sidebar -->
      <nav class="col-md-3 col-lg-2 sidebar bg-light p-3">
        <h5>Navigation</h5>
        <a href="dashboard.html">Home</a>
        <a href="profile.html">Profile</a>
        <a href="settings.html">Settings</a>
        <a href="reports.html">Reports</a>
        <a href="index.html">Logout</a>
      </nav>

      <!-- Content Area -->
      <main class="col-md-9 col-lg-10 p-4">
        <h3>Application Settings</h3>
        <p>Manage your preferences and configurations here.</p>

        <!-- Example Settings Form -->
        <form>
          <div class="mb-3">
            <label class="form-label">Change Username</label>
            <input type="text" class="form-control" placeholder="Enter new username">
          </div>
          <div class="mb-3">
            <label class="form-label">Change Password</label>
            <input type="password" class="form-control" placeholder="Enter new password">
          </div>
          <div class="mb-3">
            <label class="form-label">Theme</label>
            <select class="form-select">
              <option selected>Light</option>
              <option>Dark</option>
              <option>Blue</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary">Save Changes</button>
        </form>
      </main>
    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-dark text-white text-center p-3 mt-auto">
    <p>&copy; 2026 Your Company. All rights reserved.</p>
  </footer>
</body>
</html>
