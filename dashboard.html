<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Header -->
  <header class="bg-dark text-white text-center p-3">
    <h2>Dashboard</h2>
  </header>

  <!-- Main Layout -->
  <div class="container-fluid">
    <div class="row">
      <!-- Sidebar -->
      <nav class="col-md-3 col-lg-2 sidebar bg-light p-3">
        <h5>Navigation</h5>
        <a href="dashboard.html">Home</a>
        <a href="profile.html">Profile</a>
        <a href="settings.html">Settings</a>
        <a href="reports.html">Reports</a>
        <a href="index.html">Logout</a>
      </nav>

      <!-- Content Area -->
      <main class="col-md-9 col-lg-10 p-4">
        <h3>Welcome, Admin!</h3>
        <p>This is your dashboard content area. Add charts, tables, or widgets here.</p>

        <div class="row">
          <div class="col-md-4">
            <div class="card text-center">
              <div class="card-body">
                <h5 class="card-title">Users</h5>
                <p class="card-text">120 Active</p>
              </div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="card text-center">
              <div class="card-body">
                <h5 class="card-title">Sales</h5>
                <p class="card-text">$15,000</p>
              </div>
            </div>
          </div>
          <div class="col-md-4">
            <div class="card text-center">
              <div class="card-body">
                <h5 class="card-title">Reports</h5>
                <p class="card-text">30 Generated</p>
              </div>
            </div>
          </div>
        </div>

        <button class="btn btn-primary mt-3" onclick="showAlert()">Click Me</button>
      </main>
    </div>
  </div>

  <!-- Footer -->
  <footer class="bg-dark text-white text-center p-3 mt-auto">
    <p>&copy; 2026 Your Company. All rights reserved.</p>
  </footer>

  <script src="css/js/script.js"></script>
</body>
</html>
